<link rel="stylesheet" href="components/section-dashboard.css">
<!-- Dashboard Section -->
<section id="dashboard" class="section active">

    <!-- 1. Dashboard Usage Summary Panel -->
    <div class="dashboard-usage-panel" id="dashboardUsagePanel" style="display: none;">
        <div class="system-info-header">
            <h3><i class="fas fa-chart-pie"></i> <span data-i18n="dashboard.usageSummary">用量概览</span></h3>
            <button id="refreshDashboardUsageBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新">
                <i class="fas fa-sync-alt"></i> <span data-i18n="common.refresh">刷新</span>
            </button>
        </div>
        <div id="dashboardUsageGrid" class="dashboard-usage-grid">
            <div class="status-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span data-i18n="common.loading">加载中...</span>
            </div>
        </div>
    </div>

    <!-- 2. System Information Panel -->
    <div class="system-info-panel">
        <div class="system-info-header">
            <h3 data-i18n="dashboard.systemInfo">系统信息</h3>
            <div class="update-controls">
                <div id="versionSelectWrapper" style="display: none; margin-right: 8px;">
                    <select id="versionSelect" class="form-control select-sm" style="height: 32px; padding: 0 8px; font-size: 13px; min-width: 120px;">
                    </select>
                </div>
                <button id="checkUpdateBtn" class="btn btn-outline btn-sm" data-i18n-title="dashboard.update.checkTitle" title="检查更新">
                    <i class="fas fa-sync-alt"></i> <span data-i18n="dashboard.update.check">检查更新</span>
                </button>
                <button id="performUpdateBtn" class="btn btn-primary btn-sm" style="display: none;" data-i18n-title="dashboard.update.performTitle" title="执行更新">
                    <i class="fas fa-download"></i> <span data-i18n="dashboard.update.perform">立即更新</span>
                </button>
            </div>
        </div>

        <!-- Hero: uptime + server time -->
        <div class="sysinfo-hero">
            <div class="sysinfo-hero-item">
                <div class="sysinfo-hero-icon"><i class="fas fa-clock"></i></div>
                <div class="sysinfo-hero-body">
                    <span class="sysinfo-hero-label" data-i18n="dashboard.uptime">运行时间</span>
                    <span class="sysinfo-hero-value" id="uptime">--</span>
                </div>
            </div>
            <div class="sysinfo-hero-item">
                <div class="sysinfo-hero-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="sysinfo-hero-body">
                    <span class="sysinfo-hero-label" data-i18n="dashboard.serverTime">服务器时间</span>
                    <span class="sysinfo-hero-value" id="serverTime">--</span>
                </div>
            </div>
        </div>
        <!-- Hidden: keep appVersion element for JS compatibility -->
        <span id="appVersion" style="display:none;">--</span>
        <span class="update-badge" id="updateBadge" style="display:none;"><span id="latestVersionText">--</span></span>

        <!-- Detail grid -->
        <div class="sysinfo-grid">
            <div class="sysinfo-card">
                <i class="fas fa-cogs"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.serviceMode">运行模式</span>
                    <span class="sysinfo-card-value" id="serviceMode">--</span>
                </div>
            </div>
            <div class="sysinfo-card">
                <i class="fas fa-code"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.nodeVersion">Node.js</span>
                    <span class="sysinfo-card-value" id="nodeVersion">--</span>
                </div>
            </div>
            <div class="sysinfo-card">
                <i class="fas fa-desktop"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.platform">操作系统</span>
                    <span class="sysinfo-card-value" id="platformInfo">--</span>
                </div>
            </div>
            <div class="sysinfo-card">
                <i class="fas fa-memory"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.memoryUsage">内存</span>
                    <span class="sysinfo-card-value" id="memoryUsage">--</span>
                </div>
            </div>
            <div class="sysinfo-card">
                <i class="fas fa-microchip"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.cpuUsage">CPU</span>
                    <span class="sysinfo-card-value" id="cpuUsage">--</span>
                </div>
            </div>
            <div class="sysinfo-card">
                <i class="fas fa-fingerprint"></i>
                <div class="sysinfo-card-body">
                    <span class="sysinfo-card-label" data-i18n="dashboard.processPid">PID</span>
                    <span class="sysinfo-card-value" id="processPid">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Provider Nodes Status Panel -->
    <div class="provider-status-panel">
        <div class="system-info-header">
            <h3><i class="fas fa-network-wired"></i> <span data-i18n="dashboard.providerStatus">提供商节点状态</span></h3>
            <button id="refreshProviderStatusBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新">
                <i class="fas fa-sync-alt"></i> <span data-i18n="common.refresh">刷新</span>
            </button>
        </div>
        <div id="providerStatusGrid" class="provider-status-grid">
            <!-- Provider status cards will be loaded here -->
            <div class="status-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span data-i18n="common.loading">加载中...</span>
            </div>
        </div>
    </div>

    <!-- Advanced Information (Collapsible) -->
    <details class="dashboard-details">
        <summary class="dashboard-summary">
            <div class="summary-content">
                <i class="fas fa-cube"></i>
                <span data-i18n="dashboard.advancedInfo">可用模型列表</span>
                <span class="expand-hint" data-i18n="dashboard.expandMore">展开更多</span>
            </div>
            <i class="fas fa-chevron-down caret-icon"></i>
        </summary>

        <div class="routing-examples-panel" style="margin-top: 1rem; border-top: none;">
            <!-- 可用模型列表 -->
            <div class="models-section" style="margin-top: 0;">
                <div class="models-description">
                    <div class="highlight-note">
                        <i class="fas fa-info-circle"></i>
                        <span data-i18n="models.note">点击模型名称可直接复制到剪贴板</span>
                    </div>
                </div>
                
                <!-- Models Container -->
                <div class="models-container">
                    <div id="modelsList" class="models-list">
                        <!-- Models will be loaded here -->
                        <div class="models-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span data-i18n="common.loading">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </details>
    
</section>
