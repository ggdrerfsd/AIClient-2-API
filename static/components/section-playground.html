<link rel="stylesheet" href="components/section-playground.css">
<!-- Playground Section -->
<section id="playground" class="section" aria-labelledby="playground-title">
    <h2 id="playground-title"><i class="fas fa-flask" style="margin-right:0.5rem;font-size:1.2rem;"></i>Playground</h2>

    <div class="playground-layout">
        <!-- Left: Config Panel -->
        <div class="playground-config">
            <div class="playground-config-card">
                <label><i class="fas fa-network-wired" style="margin-right:0.3rem;"></i>提供商</label>
                <select id="pg-provider-select" class="playground-select">
                    <option value="">加载中...</option>
                </select>

                <label style="margin-top:0.25rem;"><i class="fas fa-cube" style="margin-right:0.3rem;"></i>模型</label>
                <select id="pg-model-select" class="playground-select" disabled>
                    <option value="">请先选择提供商</option>
                </select>
            </div>

            <button class="playground-clear-btn" id="pg-clear-btn">
                <i class="fas fa-trash-alt"></i> 清空对话
            </button>
        </div>

        <!-- Right: Chat Area -->
        <div class="playground-chat">
            <div class="playground-messages" id="pg-messages">
                <div class="playground-empty" id="pg-empty">
                    <i class="fas fa-comment-dots"></i>
                    <p>选择提供商和模型后开始对话</p>
                </div>
            </div>

            <!-- Attachment preview -->
            <div class="pg-attachments-preview" id="pg-attachments-preview"></div>

            <!-- Input Area -->
            <div class="playground-input-area">
                <div class="playground-input-row">
                    <button class="pg-attach-btn" id="pg-attach-btn" title="上传文件（图片/PDF）">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <textarea
                        id="pg-input"
                        class="playground-textarea"
                        placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
                        rows="1"
                        disabled
                    ></textarea>
                    <button class="pg-send-btn" id="pg-send-btn" disabled title="发送">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="pg-hint">Shift+Enter 换行 · Enter 发送</div>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="pg-file-input" accept="image/*,.pdf" multiple style="display:none;">
</section>
